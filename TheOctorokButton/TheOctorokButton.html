<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link's Octorok Button</title>
    <link rel="icon" href="favicon/TheOctorokButton.ico" type="image/x-icon">
    <style>

        @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
}

        @font-face {
    font-family: 'Comic Sans MS';
    src: url('../comic-sans.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: conic-gradient(
                from var(--angle) at center,
                #118413,
                #0db110,
                #09c10c,
                #0dd310,
                #09c10c,
                #0db110,
                #118413
            );
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Comic Sans MS, cursive;
            overflow: hidden;
            position: relative;
            animation: spin 10s linear infinite;
            z-index: -1;
        }

        @keyframes spin {
        to {
        --angle: 360deg;
  }
}

#hub-btn {
    position: absolute;
    top: 20px;
    padding: 10px 15px;
    font-size: 1rem;
    background-color: transparent;
    color: #fff;
    text-decoration: none;
    border:#000000 solid 2px;
    border-radius: 5px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: background-color 0.3s ease, box-shadow 0.3s ease;
}

        .octorok-button {
            width: 250px;
            height: 250px;
            max-width: 70vw;
            max-height: 70vw;
            background-color: #FFFFFF;
            border: 8px solid #000000;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4), inset 0 -8px 0 #DDDDDD;
            outline: none;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: transform 0.05s ease, box-shadow 0.05s ease;
        }

        .octorok-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            pointer-events: none;
        }

        .octorok-label {
            position: absolute;
            top: calc(50% - 175px);
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #FFFFFF;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            pointer-events: none;
            user-select: none;
        }

        .octorok-button.pressed {
            transform: scale(0.92);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4), inset 0 -2px 0 #DDDDDD;
        }
    </style>
</head>
<body>

<a href="../index.html" id="hub-btn" class="button">← HUB</a>

    <div class="octorok-label">Link's Octorok Button</div>
    <button class="octorok-button" id="octorokBtn" aria-label="Link's Octorok Button">
        <img src="Link.png" alt="Octorok">
    </button>

    <script>
        const button = document.getElementById('octorokBtn');

        // Preload image via JS
        const preloadImg = new Image();
        preloadImg.src = 'Link.png';

        // Preload audio via Web Audio API — each press spawns a new BufferSource so sounds overlap
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let audioBuffer = null;

        async function loadAudio() {
            if (!AudioContext) return;
            audioCtx = new AudioContext();
            try {
                const res = await fetch('Link-Octorok.mp3');
                const arrayBuf = await res.arrayBuffer();
                audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
            } catch (err) {
                console.log('Audio preload failed, falling back to Audio element.', err);
                audioCtx = null;
            }
        }
        loadAudio();

        // Chrome requires a first user gesture before vibration is allowed.
        // This silently "unlocks" vibration on the first touch.
        window.addEventListener('touchstart', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            if (navigator.vibrate) navigator.vibrate(1);
        }, { once: true });

        function playOctorok(e) {
            if (e) e.preventDefault();

            // Press animation
            button.classList.add('pressed');
            setTimeout(() => button.classList.remove('pressed'), 150);

            // Vibration on press
            if (navigator.vibrate) {
                navigator.vibrate(40);
            }

            // Each press creates a new BufferSource — fully overlapping chaos 🔥
            if (audioCtx && audioBuffer) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start(0);
            } else {
                const audio = new Audio('Link-Octorok.mp3');
                audio.play().catch(err => console.log('Audio playback failed.', err));
            }
        }

        // Event listeners
        // Track touch so click doesn't double-fire on mobile
        let didTouch = false;
        button.addEventListener('touchstart', (e) => {
            didTouch = true;
            playOctorok(e);
        }, { passive: false });
        button.addEventListener('click', (e) => {
            if (didTouch) { didTouch = false; return; }
            playOctorok(e);
        });
    </script>

</body>
</html>
